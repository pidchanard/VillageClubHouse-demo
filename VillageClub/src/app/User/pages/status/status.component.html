<app-header-user></app-header-user>

<main class="user-page">
  <section class="page-hero compact">
    <p class="eyebrow">{{ text.eyebrow }}</p>
    <h1>{{ text.title }}</h1>
    <p>{{ text.subtitle }} <strong id="updateTime"></strong></p>
  </section>

  <section class="facility-list">
    <article *ngFor="let fac of facilities" class="modern-card facility-card">
      <img [src]="fac.fac_img" [alt]="getFacilityName(fac)">
      <div class="facility-card-body">
        <div>
          <p class="eyebrow">{{ text.facility }}</p>
          <h2>{{ getFacilityName(fac) }}</h2>
        </div>
        <span class="status-pill">{{ getStatusLabel(fac.fac_Status) }}</span>
      </div>
    </article>
  </section>
</main>
