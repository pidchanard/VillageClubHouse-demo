<nav class="site-nav">
  <a class="nav-brand" routerLink="/home" aria-label="Sport Club home">
    <img src="logoSportclub.png" alt="Sport Club">
    <span>Sport Club</span>
  </a>

  <div class="nav-links">
    <a routerLink="/status" routerLinkActive="active">{{ label('status') }}</a>
    <a routerLink="/reservation" routerLinkActive="active">{{ label('reservation') }}</a>
    <a routerLink="/history" routerLinkActive="active">{{ label('history') }}</a>
    <div class="nav-about">
      <button type="button">{{ label('about') }}</button>
      <div class="about-panel">{{ label('team') }}</div>
    </div>
  </div>

  <div class="nav-actions">
    <button class="lang-toggle" type="button" (click)="toggleLanguage()" [attr.aria-label]="label('language')">
      {{ currentLanguage.toUpperCase() }}
    </button>

    <button class="icon-button" type="button" (click)="openModal()" [attr.aria-label]="label('profile')">
      <span class="material-symbols-outlined">account_circle</span>
    </button>

    <button class="icon-button" type="button" (click)="logout()" [attr.aria-label]="label('logout')">
      <span class="material-symbols-outlined">logout</span>
    </button>
  </div>
</nav>

<div *ngIf="isModalOpen" class="profile-backdrop">
  <section class="profile-modal">
    <div class="profile-modal-header">
      <div>
        <p>{{ label('profile') }}</p>
        <h2>{{ label('editProfile') }}</h2>
      </div>
      <button type="button" class="icon-button dark" (click)="closeModal()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <form (ngSubmit)="updateUser()" class="profile-form">
      <label>
        <span>{{ label('firstName') }}</span>
        <input type="text" [(ngModel)]="userData.FirstName" name="firstname" placeholder="First name">
      </label>

      <label>
        <span>{{ label('lastName') }}</span>
        <input type="text" [(ngModel)]="userData.LastName" name="lastname" placeholder="Last name">
      </label>

      <label>
        <span>{{ label('phone') }}</span>
        <input type="text" maxlength="10" [(ngModel)]="userData.Phone" name="phone" placeholder="08xxxxxxxx">
      </label>

      <label>
        <span>{{ label('birthdate') }}</span>
        <input type="date" [(ngModel)]="userData.BirthDate" name="birthdate">
      </label>

      <label class="full">
        <span>Email</span>
        <input type="email" [(ngModel)]="userData.Email" name="email" placeholder="you@example.com">
      </label>

      <label class="full">
        <span>{{ label('newPassword') }}</span>
        <input type="password" maxlength="10" [(ngModel)]="userData.Password" name="password" placeholder="New password">
      </label>

      <div class="profile-actions">
        <button type="button" class="secondary-action" (click)="closeModal()">{{ label('cancel') }}</button>
        <button type="submit" class="save-action">{{ label('save') }}</button>
      </div>
    </form>
  </section>
</div>
