<aside class="admin-sidebar" [class.collapsed]="!isSidebarOpen">
  <button type="button" class="sidebar-brand" (click)="toggleSidebar()">
    <img src="logo.png" alt="Sport Club">
    <span *ngIf="isSidebarOpen">Sport Club</span>
  </button>

  <nav class="sidebar-menu">
    <a routerLink="/adminhome" routerLinkActive="active">
      <mat-icon>space_dashboard</mat-icon>
      <span *ngIf="isSidebarOpen">Dashboard</span>
    </a>
    <a routerLink="/employee-manage" routerLinkActive="active">
      <mat-icon>badge</mat-icon>
      <span *ngIf="isSidebarOpen">Employee</span>
    </a>
    <a routerLink="/facility" routerLinkActive="active">
      <mat-icon>fitness_center</mat-icon>
      <span *ngIf="isSidebarOpen">Facilities</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="admin-chip" *ngIf="isSidebarOpen">
      <span>Welcome</span>
      <strong>{{ userName }}</strong>
    </div>
    <button type="button" class="sidebar-logout" (click)="logoutUser()">
      <mat-icon>logout</mat-icon>
      <span *ngIf="isSidebarOpen">Logout</span>
    </button>
  </div>
</aside>
